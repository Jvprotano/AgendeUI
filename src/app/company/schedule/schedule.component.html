<div class="h-100 w-100 d-flex">
  <app-sidebar [companyId]="companyId"></app-sidebar>

  <div class="company-area w-100">
    <!-- Page Header -->
    <div class="d-flex align-items-center justify-content-between mb-3 px-1">
      <div>
        <h4 class="fw-semibold mb-1" style="color: var(--text-primary);">
          {{ companyName || ('COMPANY.CALENDAR.SCHEDULE' | translate) }}
        </h4>
        <p class="text-muted mb-0 small">
          {{ 'COMPANY.CALENDAR.SCHEDULE_SUBTITLE' | translate }}
        </p>
      </div>
    </div>

    <!-- Status Legend -->
    <div class="d-flex flex-wrap align-items-center gap-3 mb-3 px-1">
      <span
        *ngFor="let item of statusItems"
        class="d-inline-flex align-items-center gap-1 small text-muted"
      >
        <span class="legend-dot" [style.background-color]="item.color"></span>
        <span>{{ item.labelKey | translate }}</span>
      </span>
    </div>

    <!-- Calendar Card -->
    <div class="calendar-card rounded-3 shadow-sm position-relative">
      <!-- Loading Bar -->
      <mat-progress-bar
        *ngIf="isLoading"
        mode="indeterminate"
        class="calendar-loading-bar"
      ></mat-progress-bar>

      <!-- Calendar -->
      <div #calendarEl class="p-3"></div>
    </div>
  </div>
</div>
