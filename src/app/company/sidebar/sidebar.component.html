<div class="sidebar-menu">
  <a class="sidebar-brand" [routerLink]="['/user/companies']">
    <span class="brand-mark">A</span>
    <div class="brand-text">
      <strong>Agende</strong>
      <small>Painel</small>
    </div>
  </a>

  <div class="sidebar-user">
    <a [routerLink]="['/user/profile']" class="user-avatar" aria-label="Perfil">
      <img src="assets/default-user.jpg" width="40" height="40" alt="Perfil" />
    </a>
    <div class="user-copy">
      <span>Conta</span>
      <small>Gerenciar perfil</small>
    </div>
  </div>

  <nav class="nav-list" aria-label="Menu da empresa">
    <a
      ngbTooltip="Dashboard"
      placement="right"
      [routerLink]="['/company', companyId, 'dashboard']"
      routerLinkActive="active"
      class="menu-item"
    >
      <i class="bi bi-bar-chart-line"></i>
      <span>Dashboard</span>
    </a>

    <a
      ngbTooltip="Agenda"
      placement="right"
      [routerLink]="['/company', companyId, 'schedule']"
      routerLinkActive="active"
      class="menu-item"
    >
      <i class="bi bi-calendar-date"></i>
      <span>Agenda</span>
    </a>

    <a
      ngbTooltip="Serviços"
      placement="right"
      [routerLink]="['/company', companyId, 'services']"
      routerLinkActive="active"
      class="menu-item"
    >
      <i class="bi bi-briefcase"></i>
      <span>Serviços</span>
    </a>

    <a
      ngbTooltip="Profissionais"
      placement="right"
      [routerLink]="['/company', companyId, 'employees']"
      routerLinkActive="active"
      class="menu-item"
    >
      <i class="bi bi-people"></i>
      <span>Profissionais</span>
    </a>

    <a
      ngbTooltip="Editar Empresa"
      placement="right"
      [routerLink]="['/company', companyId, 'edit']"
      routerLinkActive="active"
      class="menu-item"
    >
      <i class="bi bi-pencil-square"></i>
      <span>Empresa</span>
    </a>

    <a
      ngbTooltip="Financeiro"
      placement="right"
      [routerLink]="['/company', companyId, 'financial']"
      routerLinkActive="active"
      class="menu-item"
    >
      <i class="bi bi-cash-coin"></i>
      <span>Financeiro</span>
    </a>
  </nav>

  <div class="sidebar-support">
    <app-whatsapp-support variant="sidebar" label="Suporte"></app-whatsapp-support>
  </div>

  <a
    ngbTooltip="Voltar para minhas empresas"
    placement="right"
    class="menu-item menu-item-exit"
    [routerLink]="['/user/companies']"
  >
    <i class="bi bi-box-arrow-left"></i>
    <span>Minhas empresas</span>
  </a>
</div>
