<div class="booking-page">
  <!-- Loading skeleton -->
  <div *ngIf="isLoading" class="booking-container">
    <div class="skeleton-header">
      <div class="skeleton skeleton-logo"></div>
      <div class="skeleton skeleton-title"></div>
    </div>
    <div class="skeleton skeleton-stepper"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card short"></div>
  </div>

  <!-- Main booking flow -->
  <div *ngIf="!isLoading && !companyNotFound" class="booking-container">
    <!-- Company header -->
    <div class="booking-header">
      <img *ngIf="company?.image" class="header-logo" [src]="company!.image" [alt]="company!.name">
      <div *ngIf="!company?.image" class="header-logo-placeholder">
        <i class="bi bi-building"></i>
      </div>
      <div class="header-info">
        <h1 class="header-company-name">{{ company?.name }}</h1>
        <span class="header-powered">{{ 'SCHEDULING.POWERED_BY' | translate }}</span>
      </div>
    </div>

    <!-- Schedule closed message -->
    <div *ngIf="scheduleClosed" class="schedule-closed">
      <div class="schedule-closed-icon">
        <i class="bi bi-calendar-x"></i>
      </div>
      <h2 class="schedule-closed-title">{{ 'SCHEDULING.CLOSED.TITLE' | translate }}</h2>
      <p class="schedule-closed-message">{{ 'SCHEDULING.CLOSED.MESSAGE' | translate }}</p>
    </div>

    <!-- Stepper -->
    <app-booking-stepper *ngIf="!scheduleClosed"
      [steps]="steps"
      [currentStep]="displayStep"
      (stepClicked)="goToStep($event)">
    </app-booking-stepper>

    <!-- Step content with animation -->
    <div *ngIf="!scheduleClosed" class="booking-content">
      <!-- Step 0: Service -->
      <div *ngIf="currentStep === 0" class="step-wrapper animate-in">
        <app-step-service
          [services]="services"
          [selectedService]="selectedService"
          (serviceSelected)="onServiceSelected($event)">
        </app-step-service>
      </div>

      <!-- Step 1: Professional -->
      <div *ngIf="currentStep === 1 && !skipProfessionalStep" class="step-wrapper animate-in">
        <app-step-professional
          [professionals]="professionals"
          [selectedProfessional]="selectedProfessional"
          [noPreferenceSelected]="noPreferenceSelected"
          (professionalSelected)="onProfessionalSelected($event)">
        </app-step-professional>
      </div>

      <!-- Step 2: Date & Time -->
      <div *ngIf="currentStep === 2" class="step-wrapper animate-in">
        <app-step-datetime
          [professionalId]="noPreferenceSelected ? '' : selectedProfessional?.id ?? ''"
          [serviceId]="selectedService?.id ?? ''"
          [companyId]="companyId"
          [openingHours]="openingHours"
          [selectedDate]="selectedDate"
          [selectedTime]="selectedTime"
          (dateTimeSelected)="onDateTimeSelected($event)">
        </app-step-datetime>
      </div>

      <!-- Step 3: Confirm -->
      <div *ngIf="currentStep === 3" class="step-wrapper animate-in">
        <app-step-confirm
          [company]="company"
          [service]="selectedService"
          [professional]="selectedProfessional"
          [noPreference]="noPreferenceSelected"
          [date]="selectedDate"
          [time]="selectedTime"
          [isSubmitting]="isSubmitting"
          [isLoggedIn]="isLoggedIn"
          [skipProfessionalStep]="skipProfessionalStep"
          (confirmed)="onConfirmed()"
          (guestConfirmed)="onGuestConfirmed()"
          (loginRequested)="onLoginRequested()"
          (editStep)="onEditStep($event)">
        </app-step-confirm>
      </div>
    </div>

    <!-- Navigation footer -->
    <div class="booking-footer" *ngIf="!scheduleClosed && currentStep !== 3">
      <button *ngIf="displayStep > 0"
              class="btn-back"
              (click)="goToPreviousStep()">
        <i class="bi bi-arrow-left"></i>
        {{ 'SCHEDULING.BACK' | translate }}
      </button>

      <button class="btn-continue"
              [class.disabled]="!canAdvance()"
              [disabled]="!canAdvance()"
              (click)="goToNextStep()">
        {{ 'SCHEDULING.CONTINUE' | translate }}
        <i class="bi bi-arrow-right"></i>
      </button>
    </div>

    <!-- Back button on confirm step -->
    <div class="booking-footer" *ngIf="!scheduleClosed && currentStep === 3">
      <button class="btn-back" (click)="goToPreviousStep()">
        <i class="bi bi-arrow-left"></i>
        {{ 'SCHEDULING.BACK' | translate }}
      </button>
    </div>
  </div>
</div>
