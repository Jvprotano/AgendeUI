<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="default" color="#fff" type="square-jelly-box" [fullScreen]="true">
  <p style="color: white">Carregando...</p>
</ngx-spinner>

<ng-template #modalContent let-close="close">
  <div class="modal-header border-bottom">
    <div class="d-flex align-items-center gap-3 w-100">
      <div class="step-indicator">
        <span class="step" [class.active]="currentStep === 0">1</span>
        <span class="step" [class.active]="currentStep === 1">2</span>
        <span class="step" [class.active]="currentStep === 2">3</span>
      </div>
      <div class="flex-grow-1">
        <h5 class="modal-title mb-0">
          {{ currentStep === 0 ? 'Informações Básicas' : currentStep === 1 ? 'Horários' : 'Finalizar' }}
        </h5>
        <small class="text-muted">
          {{ currentStep === 0 ? 'Passo 1 de 3' : currentStep === 1 ? 'Passo 2 de 3' : 'Passo 3 de 3' }}
        </small>
      </div>
      <button type="button" class="btn btn-close" (click)="close()"></button>
    </div>
  </div>

  <mat-progress-bar mode="determinate"
    [value]="(currentStep + 1) * 33.33" class="progress-bar-custom"></mat-progress-bar>

  <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
    <div class="modal-body company-modal">
      <app-basic-info *ngIf="currentStep == 0" (next)="onNextStep($event)" [form]="createForm"></app-basic-info>

      <app-business-sector *ngIf="currentStep == 1" [form]="createForm" (previous)="onPreviousStep()"
        (next)="onNextStep($event)"></app-business-sector>

      <app-share-info *ngIf="currentStep == 2" [form]="createForm" (previous)="onPreviousStep()"></app-share-info>

    </div>

    <!-- Modal Footer -->
    <div class="modal-footer border-top">
      <div class="d-flex gap-2 w-100">
        <button *ngIf="currentStep > 0" type="button" class="btn btn-outline-secondary"
          (click)="onPreviousStep()">
          <i class="bi bi-chevron-left me-2"></i>Anterior
        </button>
        <div class="flex-grow-1"></div>
        <button *ngIf="currentStep < 2" type="button" class="btn btn-conci"
          (click)="onNextStep({})">
          Próximo<i class="bi bi-chevron-right ms-2"></i>
        </button>
        <button *ngIf="currentStep === 2" type="submit" class="btn btn-success">
          <i class="bi bi-check-circle me-2"></i>Salvar Empresa
        </button>
      </div>
    </div>
  </form>
</ng-template>
