<ng-template #modalContent let-close="close">
  <div class="modal-header">
    <h1 class="modal-title">Criar Empresa</h1>
    <button type="button" class="btn btn-close" (click)="close()"></button>
  </div>

  <mat-progress-bar mode="determinate" [value]="currentStep === 0 ? 50 : 100"></mat-progress-bar>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="modal-body company-modal">
      <div class="step-description" *ngIf="currentStep === 0">
        <p>Preencha os dados da empresa e defina o link de agendamento.</p>
      </div>
      <div class="step-description" *ngIf="currentStep === 1">
        <p>Configure os horários de atendimento iniciais.</p>
      </div>

      <app-basic-info
        *ngIf="currentStep === 0"
        [form]="form"
        [showCard]="false"
        [horizontal]="true">
      </app-basic-info>

      <app-business-sector
        *ngIf="currentStep === 1"
        [form]="form">
      </app-business-sector>
    </div>

    <div class="modal-footer">
      <div class="footer-actions">
        <button
          *ngIf="currentStep > 0"
          mat-stroked-button
          type="button"
          (click)="onPreviousStep()">
          <mat-icon>arrow_back</mat-icon>
          Voltar
        </button>
        <span class="spacer"></span>
        <button
          *ngIf="currentStep === 0"
          mat-flat-button
          color="primary"
          type="button"
          (click)="onNextStep()">
          Próximo
          <mat-icon>arrow_forward</mat-icon>
        </button>
        <button
          *ngIf="currentStep === 1"
          class="btn btn-success"
          type="submit"
          [disabled]="!form.valid">
          Criar
        </button>
      </div>
    </div>
  </form>
</ng-template>
