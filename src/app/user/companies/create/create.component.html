<ng-template #modalContent let-close="close">
  <div class="modal-header">
    <h1 class="modal-title">Criar Empresa</h1>
    <button type="button" class="btn btn-close" (click)="close()"></button>
  </div>

  <mat-progress-bar mode="determinate" [value]="currentStep === 0 ? 50 : 100"></mat-progress-bar>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="modal-body company-modal">
      <app-basic-info
        *ngIf="currentStep === 0"
        [form]="form">
      </app-basic-info>

      <app-business-sector
        *ngIf="currentStep === 1"
        [form]="form">
      </app-business-sector>
    </div>

    <div class="modal-footer">
      <div class="footer-actions">
        <button
          *ngIf="currentStep > 0"
          mat-stroked-button
          type="button"
          (click)="onPreviousStep()">
          <mat-icon>arrow_back</mat-icon>
          Voltar
        </button>
        <span class="spacer"></span>
        <button
          *ngIf="currentStep === 0"
          mat-flat-button
          color="primary"
          type="button"
          (click)="onNextStep()">
          Pr&oacute;ximo
          <mat-icon>arrow_forward</mat-icon>
        </button>
        <button
          *ngIf="currentStep === 1"
          class="btn btn-success"
          type="submit">
          Criar
        </button>
      </div>
    </div>
  </form>
</ng-template>
