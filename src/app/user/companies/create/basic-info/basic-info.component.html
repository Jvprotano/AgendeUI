<form [formGroup]="form" class="basic-info-form">
  <mat-card *ngIf="showCard" class="mb-4">
    <mat-card-content>
      <ng-container *ngTemplateOutlet="formContent"></ng-container>
    </mat-card-content>
  </mat-card>

  <ng-container *ngIf="!showCard">
    <ng-container *ngTemplateOutlet="formContent"></ng-container>
  </ng-container>

  <ng-template #formContent>
    <!-- Image Upload -->
    <div class="image-upload-container">
      <div class="image-preview" [class.has-image]="hasImage()">
        <input class="d-none" id="company-image" type="file" (change)="onFileChange($event)" accept="image/*" />
        <img [src]="hasImage() ? imageValue : 'assets/not-found.png'" [alt]="hasImage() ? 'Company Logo' : 'No Image'" />
        <label for="company-image" class="upload-overlay" matRipple>
          <mat-icon>{{ hasImage() ? 'edit' : 'add_a_photo' }}</mat-icon>
          <span>{{ hasImage() ? 'Alterar' : 'Adicionar Logo' }}</span>
        </label>
      </div>
      <button *ngIf="hasImage()" mat-stroked-button color="warn" (click)="removeImage()" class="remove-image-btn">
        <mat-icon>delete</mat-icon>
        Remover Imagem
      </button>
    </div>

    <!-- Company Details -->
    <div class="form-section">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nome da Empresa</mat-label>
        <input matInput formControlName="name" required>
        <mat-error *ngIf="form.get('name')?.hasError('required')">
          Nome da empresa é obrigatório
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>CNPJ (Opcional)</mat-label>
        <input matInput formControlName="cnpj" [mask]="'00.000.000/0000-00'" placeholder="00.000.000/0000-00">
      </mat-form-field>
    </div>

    <!-- Scheduling URL -->
    <div class="form-section">
      <h3 class="section-title">URL de Agendamento</h3>
      <p class="section-description">
        Este é o link que seus clientes usarão para agendar.
      </p>

      <div class="url-input-group">
        <mat-form-field appearance="outline" class="prefix-field">
          <input matInput [value]="prefix" readonly>
        </mat-form-field>

        <mat-form-field appearance="outline" class="url-field">
          <mat-label>URL</mat-label>
          <input matInput formControlName="schedulingUrl"
                 (keyup)="checkUrlIsValid()"
                 placeholder="sua-empresa">
          <mat-icon matSuffix *ngIf="isCheckingUrl" class="checking-icon">sync</mat-icon>
          <mat-hint *ngIf="urlSuccessMessage" class="url-status success">
            <mat-icon class="status-icon">check_circle</mat-icon>
            {{ urlSuccessMessage }}
          </mat-hint>
          <mat-error *ngIf="urlErrorMessage" class="url-status error">
            <mat-icon class="status-icon">error</mat-icon>
            {{ urlErrorMessage }}
          </mat-error>
        </mat-form-field>
      </div>
    </div>
  </ng-template>
</form>
