<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="business-sector-container">
    <h5 class="mb-4 fw-bold text-dark">Horários de Funcionamento</h5>

    <div class="weekdays-grid">
      <div class="weekday-item" *ngFor="let day of weekdays; let i = index" formArrayName="weekdays">
        <div class="day-header">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" [id]="'day-' + i"
              [checked]="day.checked" (change)="day.checked = $any($event.target).checked"/>
            <label class="form-check-label" [for]="'day-' + i">
              {{ day.day }}
            </label>
          </div>
        </div>

        <div class="day-times" *ngIf="day.checked">
          <div class="time-inputs">
            <div class="time-group">
              <label class="time-label">Abertura</label>
              <input type="time" class="form-control form-control-sm"
                (change)="day.intervals[0].start = $any($event.target).value"
                [value]="day.intervals[0].start">
            </div>
            <div class="time-group">
              <label class="time-label">Fechamento</label>
              <input type="time" class="form-control form-control-sm"
                (change)="day.intervals[0].end = $any($event.target).value"
                [value]="day.intervals[0].end">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
