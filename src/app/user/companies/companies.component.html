<div class="companies-header">
  <h1>Minhas Empresas</h1>
  <button class="btn btn-conci" (click)="editCompany(null)">
    <i class="bi bi-plus me-2"></i>Adicionar Empresa
  </button>
</div>

<div class="row">
  <!-- Company Cards -->
  <div class="form-group" *ngFor="let item of companies">
    <div class="card">
      <!-- Options Menu -->
      <div *ngIf="item.status != 0" class="options">
        <div (click)="deleteCompany(item.id)" class="delete" title="Deletar empresa">
          <i class="bi bi-trash"></i>
        </div>
        <div ngbDropdown class="more-options" title="Mais opções">
          <button class="btn btn-link p-0" ngbDropdownToggle type="button">
            <i class="bi bi-three-dots-vertical"></i>
          </button>
          <div ngbDropdownMenu class="dropdown-menu-end">
            <button class="dropdown-item" ngbDropdownItem (click)="editCompany(item)">
              <i class="bi bi-pencil"></i>
              <span>Editar</span>
            </button>
            <hr class="my-1">
            <button class="dropdown-item" ngbDropdownItem (click)="shareLink(item)">
              <i class="bi bi-share"></i>
              <span>Copiar Link</span>
            </button>
            <hr class="my-1">
            <button class="dropdown-item" ngbDropdownItem (click)="openCloseSchedule(item.id)"
              *ngIf="item.scheduleStatus == 1">
              <i class="bi bi-x-circle"></i>
              <span>Fechar Agenda</span>
            </button>
            <button class="dropdown-item" ngbDropdownItem (click)="openCloseSchedule(item.id)"
              *ngIf="!(item.scheduleStatus == 1)">
              <i class="bi bi-check-circle"></i>
              <span>Abrir Agenda</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Logo Section -->
      <div class="logo">
        <img src="assets/not-found.png" alt="{{item.name}}">
      </div>

      <!-- Company Info -->
      <div class="company-info">
        <h4 class="card-title">{{ item.name }}</h4>
        <p class="card-text">{{ item.description }}</p>
      </div>

      <!-- Stats Section -->
      <div class="row text-center text-muted mb-3">
        <div class="col-6 border-end border-end-dashed">
          <h5 class="fs-6 mb-1 projects-num">225</h5>
          <p class="text-muted mb-0" style="font-size: 0.8rem;">Agendamentos em janeiro</p>
        </div>
        <div class="col-6">
          <h5 class="fs-6 mb-1 tasks-num">197</h5>
          <p class="text-muted mb-0" style="font-size: 0.8rem;">Agendamentos Hoje</p>
        </div>
      </div>

      <!-- Action Button -->
      <div class="mt-auto">
        <a *ngIf="item.status == 1" [routerLink]="['/company', item.id, 'schedule']"
          class="btn btn-outline-conci view-btn w-100">
          <i class="bi bi-calendar-check me-2"></i>Selecionar
        </a>
        <button *ngIf="item.status == 0" (click)="activeCompany(item.id)"
          class="btn btn-outline-success w-100">
          <i class="bi bi-check-circle me-2"></i>Ativar
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Create/Edit Modal -->
<app-create [companyToEdit]="companyToEdit" *ngIf="clickedEdit"></app-create>
