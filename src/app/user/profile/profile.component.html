<div class="profile-page">
  <section class="profile-card">
    <header class="profile-header">
      <div>
        <h1>Meu perfil</h1>
        <p>Atualize seus dados de contato e imagem de exibicao.</p>
      </div>
    </header>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
      <div class="avatar-section">
        <input class="d-none" id="fileInput" type="file" (change)="onFileChange($event)" accept="image/*" />
        <label for="fileInput" class="avatar-wrapper" aria-label="Alterar imagem">
          <img [src]="hasImage() ? profileForm.get('imageUrl')?.value : 'assets/user-icon.svg'" alt="Foto de perfil" />
          <span class="avatar-overlay">
            <i class="bi bi-camera"></i>
            Alterar foto
          </span>
        </label>

        <button type="button" class="btn-remove-photo" (click)="removeImage()" *ngIf="hasImage()">
          <i class="bi bi-trash"></i>
          Remover imagem
        </button>
      </div>

      <div class="fields-grid">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input class="form-control" type="text" formControlName="firstName" />
        </div>

        <div class="form-group">
          <label class="form-label">Sobrenome</label>
          <input class="form-control" type="text" formControlName="lastName" />
        </div>

        <div class="form-group form-group--full">
          <label class="form-label">Email</label>
          <input class="form-control" [readOnly]="true" type="email" formControlName="email" />
        </div>

        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input class="form-control" type="text" formControlName="phoneNumber" placeholder="(99) 9 9999-9999" />
        </div>

        <div class="form-group">
          <label class="form-label">Data de nascimento</label>
          <input class="form-control" type="date" formControlName="birthDate" />
        </div>
      </div>

      <div class="profile-actions">
        <button type="submit" class="btn-save">
          <i class="bi bi-check2"></i>
          Salvar alteracoes
        </button>
      </div>
    </form>
  </section>
</div>
